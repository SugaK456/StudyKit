<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCA Quiz — Politecnico di Milano</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent-dim: #8aaa2e;
    --text: #e8e8e0;
    --text-muted: #666;
    --text-dim: #999;
    --correct: #4caf7d;
    --wrong: #e05252;
    --correct-bg: #1a2e22;
    --wrong-bg: #2e1a1a;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--text-muted); }
  .header-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    display: none;
  }
  .header-score.visible { display: block; }

  /* MAIN LAYOUT */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* HOME SCREEN */
  #home-screen { animation: fadeIn 0.4s ease; }
  .home-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }
  .home-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 3rem;
  }
  .sets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .set-card {
    background: var(--surface);
    padding: 1.25rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .set-card:hover { background: var(--surface2); }
  .set-card.completed { background: var(--surface); }
  .set-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
  }
  .set-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 0.75rem;
  }
  .set-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .set-score-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 20px;
    display: none;
  }
  .set-score-badge.show { display: block; }
  .badge-pass { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct); }
  .badge-fail { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong); }

  .info-bar {
    display: flex;
    gap: 2rem;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }
  .info-item { font-size: 13px; color: var(--text-dim); }
  .info-item strong { color: var(--text); font-weight: 500; }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; animation: fadeIn 0.3s ease; }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.05em;
  }
  .back-btn:hover { color: var(--text); }
  .progress-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-bottom: 2.5rem;
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    border-radius: 1px;
  }
  .question-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent-dim);
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }
  .question-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 2rem;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #444;
    background: var(--surface2);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 16px;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
  }
  .option-btn.correct .option-letter { color: var(--correct); }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
  }
  .option-btn.wrong .option-letter { color: var(--wrong); }
  .option-btn.reveal-correct {
    border-color: var(--correct);
    opacity: 0.6;
  }

  .feedback-box {
    display: none;
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    border-left: 3px solid;
    margin-bottom: 1.5rem;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .feedback-box.show { display: block; animation: slideUp 0.25s ease; }
  .feedback-box.correct-fb {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #8dd9b0;
  }
  .feedback-box.wrong-fb {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #e8a0a0;
  }
  .feedback-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .correct-fb .feedback-label { color: var(--correct); }
  .wrong-fb .feedback-label { color: var(--wrong); }

  .next-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    display: none;
    transition: opacity 0.15s;
  }
  .next-btn:hover { opacity: 0.85; }
  .next-btn.show { display: block; }

  /* RESULTS SCREEN */
  #results-screen { display: none; animation: fadeIn 0.3s ease; }
  .results-header { margin-bottom: 2.5rem; }
  .results-score-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 64px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .score-pass { color: var(--correct); }
  .score-fail { color: var(--wrong); }
  .score-partial { color: var(--accent); }
  .results-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 2rem;
  }
  .results-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .summary-cell {
    background: var(--surface);
    padding: 1rem;
    text-align: center;
  }
  .summary-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
  }
  .summary-label { font-size: 12px; color: var(--text-muted); }
  .num-correct { color: var(--correct); }
  .num-wrong { color: var(--wrong); }
  .num-total { color: var(--text); }

  .review-list { margin-bottom: 2rem; }
  .review-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .review-item {
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    font-size: 13px;
  }
  .review-item.ri-correct { border-color: var(--correct); background: var(--correct-bg); }
  .review-item.ri-wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .review-q { color: var(--text-dim); margin-bottom: 6px; line-height: 1.4; }
  .review-a { font-weight: 500; }
  .ri-correct .review-a { color: var(--correct); }
  .ri-wrong .review-a { color: var(--wrong); }
  .review-correct-ans { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

  .results-actions { display: flex; gap: 10px; }
  .action-btn {
    flex: 1;
    padding: 0.85rem;
    border-radius: var(--radius);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }
  .action-btn:hover { opacity: 0.8; }
  .action-btn.primary {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    main { padding: 1.5rem 1rem 3rem; }
    header { padding: 1rem; }
    .home-title { font-size: 22px; }
    .results-score-display { font-size: 48px; }
    .results-summary { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">LCA_QUIZ<span>.polimi</span></div>
  <div class="header-score" id="header-score"></div>
</header>

<main>

<!-- HOME -->
<div id="home-screen">
  <h1 class="home-title">Simulazione<br>esame LCA</h1>
  <p class="home-subtitle">10 set × 9 domande — 1 punto per risposta esatta</p>
  <div class="sets-grid" id="sets-grid"></div>
  <div class="info-bar">
    <div class="info-item">Corso <strong>LCA &amp; Materiali</strong></div>
    <div class="info-item">Riferimento <strong>ISO 14040/14044</strong></div>
    <div class="info-item">Tot. domande <strong>90</strong></div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← TORNA AI SET</button>
    <div class="progress-info" id="progress-info">1 / 9</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-label" id="question-label">DOMANDA 1</div>
  <div class="question-text" id="question-text"></div>
  <div class="options" id="options"></div>
  <div class="feedback-box" id="feedback-box">
    <div class="feedback-label" id="feedback-label"></div>
    <div id="feedback-text"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">PROSSIMA DOMANDA →</button>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="results-header">
    <div class="results-score-display" id="score-display"></div>
    <div class="results-subtitle" id="results-subtitle"></div>
  </div>
  <div class="results-summary">
    <div class="summary-cell"><span class="summary-num num-correct" id="r-correct">0</span><span class="summary-label">Corrette</span></div>
    <div class="summary-cell"><span class="summary-num num-wrong" id="r-wrong">0</span><span class="summary-label">Errate</span></div>
    <div class="summary-cell"><span class="summary-num num-total">9</span><span class="summary-label">Totale</span></div>
  </div>
  <div class="review-list">
    <div class="review-title">RIEPILOGO RISPOSTE</div>
    <div id="review-items"></div>
  </div>
  <div class="results-actions">
    <button class="action-btn" onclick="retrySet()">RIPROVA SET</button>
    <button class="action-btn primary" onclick="goHome()">ALTRI SET →</button>
  </div>
</div>

</main>

<script>
const SETS = [
  {
    title: "Framework LCA e fasi ISO",
    topic: "ISO 14040/44, goal & scope, fasi LCA",
    questions: [
      {
        q: "Secondo ISO 14040:2006, quante sono le fasi fondamentali del framework LCA?",
        opts: ["3 fasi: inventario, valutazione impatti, interpretazione","4 fasi: goal & scope, LCI, LCIA, interpretazione","5 fasi: goal, scope, inventario, caratterizzazione, interpretazione","2 fasi: inventario e valutazione impatti"],
        correct: 1,
        fb: "ISO 14040 definisce esattamente 4 fasi iterative: (1) Goal & Scope Definition, (2) Life Cycle Inventory Analysis (LCI), (3) Life Cycle Impact Assessment (LCIA), (4) Interpretation. Le frecce bidirezionali tra le fasi indicano che il processo è iterativo e non strettamente lineare."
      },
      {
        q: "Cosa definisce l'unità funzionale in uno studio LCA?",
        opts: ["Il confine geografico del sistema analizzato","La quantificazione della funzione del sistema, usata come riferimento per tutti i flussi","Il tipo di database utilizzato per i dati di background","Il numero di processi inclusi nel sistema prodotto"],
        correct: 1,
        fb: "L'unità funzionale quantifica la funzione del sistema prodotto e serve da riferimento per normalizzare tutti gli input/output dell'inventario. Esempio: '1 m² di superficie verniciata con protezione 10 anni'. Senza un'unità funzionale ben definita, il confronto tra sistemi alternativi è privo di significato."
      },
      {
        q: "Quale delle seguenti affermazioni sul 'system boundary' è corretta secondo ISO 14044?",
        opts: ["Il confine di sistema include solo i processi di produzione primaria","Il confine di sistema deve includere obbligatoriamente tutte le fasi del ciclo di vita senza eccezioni","Il confine di sistema definisce quali processi unitari sono inclusi nello studio e deve essere giustificato","Il confine di sistema coincide sempre con lo scenario cradle-to-grave"],
        correct: 2,
        fb: "Il confine di sistema delimita quali processi unitari fanno parte del sistema prodotto. La sua definizione deve essere esplicitata e giustificata nel goal & scope. È possibile adottare confini parziali (gate-to-gate, cradle-to-gate) purché coerenti con l'obiettivo dello studio. L'esclusione di processi deve essere documentata e la loro rilevanza valutata."
      },
      {
        q: "In uno studio LCA comparativo destinato alla comunicazione pubblica (es. EPD), cosa richiede obbligatoriamente ISO 14044?",
        opts: ["La revisione critica da parte di un panel di esperti indipendenti","L'uso esclusivo del database Ecoinvent","L'adozione dello scenario cradle-to-grave","La normalizzazione obbligatoria dei risultati LCIA"],
        correct: 0,
        fb: "ISO 14044 richiede che gli studi LCA comparativi divulgati pubblicamente siano sottoposti a critical review da parte di un panel di almeno 3 esperti indipendenti. Per studi non comparativi, la revisione critica è raccomandata ma non obbligatoria. Questo requisito tutela la credibilità e la correttezza metodologica degli studi usati in comunicazione esterna."
      },
      {
        q: "Quale scenario copre le emissioni 'dalla culla al cancello' (cradle-to-gate)?",
        opts: ["Dall'estrazione delle materie prime fino alla fine vita del prodotto","Dall'estrazione delle materie prime fino all'uscita dallo stabilimento di produzione","Dall'ingresso in stabilimento fino alla consegna al cliente","Dall'uso del prodotto fino allo smaltimento finale"],
        correct: 1,
        fb: "Cradle-to-gate (dalla culla al cancello) include tutte le fasi dall'estrazione delle materie prime fino all'uscita dal cancello dello stabilimento produttivo, escludendo uso ed end-of-life. È comune per le Dichiarazioni Ambientali di Prodotto (EPD) di materiali da costruzione (EN 15804) e serve come base per calcoli downstream."
      },
      {
        q: "Il 'flusso di riferimento' (reference flow) in LCA è:",
        opts: ["Il flusso energetico principale del processo produttivo","La quantità di prodotto necessaria per soddisfare l'unità funzionale","Il flusso elementare con impatto maggiore nella categoria principale","Il primo flusso inserito nel database di inventario"],
        correct: 1,
        fb: "Il reference flow è la quantità specifica di prodotto necessaria per realizzare l'unità funzionale. Ad esempio, se l'UF è '1 m² di superficie verniciata', il reference flow potrebbe essere '0.15 kg di vernice'. Distinguere UF (funzione) da reference flow (quantità di prodotto) è fondamentale per il corretto calcolo degli inventari."
      },
      {
        q: "Cosa si intende per 'processo unitario' nell'ambito della LCI?",
        opts: ["L'insieme di tutti i processi inclusi nel sistema prodotto","Il più piccolo elemento del sistema prodotto per cui sono quantificati gli input/output","Un processo che produce esclusivamente un solo output","Il processo con il maggiore impatto ambientale dello studio"],
        correct: 1,
        fb: "Il processo unitario (unit process) è l'elemento minimo del sistema prodotto per cui vengono raccolti e quantificati gli input (materiali, energia, acqua) e gli output (prodotti, emissioni, rifiuti). La somma e il collegamento di tutti i processi unitari costituisce il sistema prodotto complessivo."
      },
      {
        q: "Secondo la norma EN 15804 per i prodotti da costruzione, le fasi del ciclo di vita sono denominate con lettere. Quale sequenza è corretta?",
        opts: ["A (produzione) → B (uso) → C (fine vita) → D (oltre confine)","P (produzione) → U (uso) → E (end-of-life) → R (recupero)","A1-A3 (produzione) → A4-A5 (cantiere) → B (uso) → C (fine vita) → D (benefici)","M (manifattura) → L (logistica) → O (operazione) → W (rifiuti)"],
        correct: 2,
        fb: "EN 15804 struttura il ciclo di vita in moduli: A1-A3 (estrazione MP, trasporto, manifattura), A4-A5 (trasporto al cantiere, posa), B1-B7 (uso, manutenzione, riparazioni, sostituzioni, uso energia/acqua), C1-C4 (demolizione, trasporto, trattamento rifiuti, smaltimento), D (benefici e carichi al di là del confine di sistema — riciclaggio, recupero energetico)."
      },
      {
        q: "In una LCA, i 'flussi elementari' sono definiti come:",
        opts: ["Flussi tra processi unitari all'interno del sistema prodotto","Materiali o energia estratti dall'ambiente o rilasciati nell'ambiente senza trasformazione umana precedente","I dati di input ricavati esclusivamente da misurazioni dirette in campo","Flussi di prodotti intermedi tra fornitori e acquirenti"],
        correct: 1,
        fb: "I flussi elementari (elementary flows) attraversano il confine sistema-ecosfera: includono risorse estratte dall'ambiente naturale (materie prime, acqua, suolo, minerali) ed emissioni rilasciate nell'ambiente (CO₂, NOx, metalli pesanti in acqua o suolo). Si distinguono dai flussi di prodotto (product flows) che attraversano confini tra processi unitari all'interno o tra sistemi prodotto."
      }
    ]
  },
  {
    title: "Life Cycle Inventory (LCI)",
    topic: "Raccolta dati, tipi di flussi, qualità dati",
    questions: [
      {
        q: "Quale dei seguenti NON è un criterio di qualità dei dati previsto da ISO 14044?",
        opts: ["Rappresentatività temporale","Rappresentatività geografica","Costo di acquisizione dei dati","Completezza"],
        correct: 2,
        fb: "ISO 14044 identifica criteri di qualità tra cui: rappresentatività temporale, geografica e tecnologica, precisione, completezza, consistenza, riproducibilità, fonti e incertezza. Il costo di acquisizione è una considerazione pratica ma non è un criterio di qualità normativo. La matrice pedigree (DQI) utilizzata in Ecoinvent valuta questi criteri su scala 1-5."
      },
      {
        q: "Nella matrice pedigree utilizzata in Ecoinvent per la Data Quality Indicator (DQI), quali sono le dimensioni valutate?",
        opts: ["Precisione, completezza, coerenza, riproducibilità, rappresentatività geografica","Affidabilità, completezza, correlazione temporale, correlazione geografica, correlazione tecnologica","Accuratezza, precisione, risoluzione, sensibilità, incertezza sistematica","Validità, verificabilità, tracciabilità, aggiornamento, peer review"],
        correct: 1,
        fb: "La matrice pedigree di Ecoinvent valuta 5 indicatori DQI: (1) Reliability — affidabilità della fonte, (2) Completeness — completezza della copertura, (3) Temporal correlation — correlazione temporale, (4) Geographical correlation — correlazione geografica, (5) Technological correlation — correlazione tecnologica. Ogni indicatore riceve un punteggio 1-5 (1=migliore). La formula DQR combina questi punteggi in un indice sintetico."
      },
      {
        q: "Cos'è un 'dato di foreground' in una LCA?",
        opts: ["Un dato proveniente da database commerciali come Ecoinvent","Un dato raccolto direttamente dai processi primari oggetto dello studio","Un dato generico rappresentativo di un settore industriale","Un dato calcolato tramite modellazione e non misurato"],

        fb: "Il rebound effect (effetto rimbalzo) è un fenomeno socioeconomico: un miglioramento dell'efficienza energetica riduce i costi operativi, il risparmio ottenuto viene reinvestito in più consumo (es. auto più efficiente → si percorrono più km). In LCA, questo effetto normalmente non è incluso nei confini del sistema tradizionale (approccio attributional), ma è rilevante in approcci consequential o nelle analisi di policy. Ignorarlo può portare a sovrastimare i benefici ambientali di prodotti più efficienti."
      },
      {
        q: "Quale metrica è usata per esprimere i risultati di impatto sulla salute umana a livello endpoint in LCIA?",
        opts: ["QALYs (Quality-Adjusted Life Years)","DALYs (Disability-Adjusted Life Years)","YLDs (Years Lived with Disability) isolati","HALYs (Health-Adjusted Life Years)"],
        correct: 1,
        fb: "In LCIA endpoint (ReCiPe, IMPACT 2002+, USEtox) l'impatto sulla salute umana è espresso in DALYs (Disability-Adjusted Life Years), metrica sviluppata dall'OMS per la valutazione del burden of disease. DALY = YLL (anni di vita persi per mortalità prematura) + YLD (anni vissuti con disabilità ponderati per gravità). I QALYs (Quality-Adjusted Life Years) sono usati in farmacoeconomia e health technology assessment ma non in LCIA standard."
      },
      {
        q: "Perché la 'normalizzazione' può essere fuorviante se usata per prioritizzare le categorie di impatto?",
        opts: ["Perché la normalizzazione elimina le differenze tra le categorie, rendendo tutti i valori uguali","Perché il valore di riferimento (es. impatti europei pro capite) può essere dominato da attività specifiche di quel paese, distorcendo l'importanza relativa delle categorie","Perché la normalizzazione è applicata solo alle categorie midpoint e non alle endpoint","Perché la normalizzazione aumenta l'incertezza dei risultati rispetto ai valori di caratterizzazione"],
        correct: 1,
        fb: "La normalizzazione divide i risultati per impatti di riferimento (es. EU totale annuo pro capite). Se il valore di riferimento europeo è dominato da certi settori (es. alta produzione di NOx agricolo in EU → alto valore di riferimento per eutrophication), una categoria può apparire 'non prioritaria' anche se per il sistema specifico è molto rilevante. Questo fenomeno di 'mascheramento' rende la normalizzazione uno strumento da usare con cautela e non come unico criterio di prioritizzazione."
      },
      {
        q: "Qual è la principale differenza tra 'uncertainty analysis' e 'variability analysis' in LCA?",
        opts: ["L'uncertainty analysis usa metodi statistici; la variability analysis usa solo giudizio esperto","L'uncertainty riguarda la mancanza di conoscenza precisa dei parametri (incertezza epistemica); la variability riguarda la reale variazione dei parametri nel mondo reale (variabilità intrinseca)","L'uncertainty analysis si applica solo ai dati di foreground; la variability ai dati di background","Non vi è differenza: i due termini sono sinonimi in LCA"],
        correct: 1,
        fb: "Uncertainty (incertezza): mancanza di conoscenza precisa di un valore che in realtà è determinato — es. fattore di emissione misurato con precisione limitata, dato da letteratura con intervallo di confidenza. Variability (variabilità): reale variazione di un parametro nello spazio o nel tempo — es. il mix energetico varia per paese e stagione, l'efficienza di un processo varia tra impianti. In LCA, entrambe contribuiscono all'incertezza dei risultati ma hanno origini diverse e richiedono trattamenti diversi (Monte Carlo per uncertainty; analisi di scenario per variability)."
      },
      {
        q: "In un report LCA conforme a ISO 14044, le 'limitazioni dello studio' devono includere:",
        opts: ["Solo i processi esclusi per il criterio di cut-off","I dati mancanti, le assunzioni non verificabili, i cut-off applicati, le limitazioni geografiche/temporali e qualsiasi elemento che riduca la rappresentatività o generalizzabilità dei risultati","Solo le categorie di impatto non calcolate per mancanza di fattori di caratterizzazione","La lista completa dei dataset con DQR > 3"],
        correct: 1,
        fb: "Le limitazioni di uno studio LCA documentano tutto ciò che riduce la completezza, la rappresentatività o la generalizzabilità dei risultati: dati non disponibili o sostituiti con proxy, assunzioni non verificabili, processi esclusi, limitazioni geografiche (dati non specifici per il paese), limitazioni temporali (dati datati), incertezze metodologiche non risolte. La dichiarazione trasparente delle limitazioni è essenziale per l'integrità scientifica e per guidare correttamente l'uso delle conclusioni."
      },
      {
        q: "Il principio di 'transparency' in ISO 14040 richiede che uno studio LCA:",
        opts: ["Sia condotto esclusivamente da organizzazioni con certificazione ISO 14001","Divulghi nella reportistica tutte le metodologie, assunzioni, dati e limitazioni in modo sufficientemente dettagliato da permettere la comprensione e la valutazione critica","Pubblichi obbligatoriamente tutti i dati primari dell'inventario in forma di dataset aperto","Adotti una metodologia standard internazionale senza variazioni locali o settoriali"],
        correct: 1,
        fb: "Il principio di trasparenza è uno dei principi fondamentali di ISO 14040 (insieme a comprehensiveness, consistency, reproducibility, functional unit): lo studio deve essere condotto e comunicato in modo che metodologie, dati, assunzioni e limitazioni siano sufficientemente documentati e chiari da permettere a un lettore qualificato di comprendere le conclusioni, valutarne la robustezza e identificarne i limiti. La trasparenza è la base della credibilità scientifica della LCA e prerequisito per qualsiasi confronto o critical review."
      }
    ]
  }
];

let currentSetIdx = 0;
let currentQIdx = 0;
let score = 0;
let answers = [];
let setScores = {};

function init() {
  renderSets();
}

function renderSets() {
  const grid = document.getElementById('sets-grid');
  grid.innerHTML = '';
  SETS.forEach((set, i) => {
    const card = document.createElement('div');
    card.className = 'set-card';
    const saved = setScores[i];
    const badge = saved !== undefined
      ? `<div class="set-score-badge show ${saved >= 6 ? 'badge-pass' : 'badge-fail'}">${saved}/9</div>`
      : '';
    card.innerHTML = `
      ${badge}
      <div class="set-number">SET ${String(i+1).padStart(2,'0')}</div>
      <div class="set-title">${set.title}</div>
      <div class="set-meta">9 domande · 1 pt/domanda</div>
    `;
    card.onclick = () => startSet(i);
    grid.appendChild(card);
  });
}

function startSet(idx) {
  currentSetIdx = idx;
  currentQIdx = 0;
  score = 0;
  answers = [];
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const set = SETS[currentSetIdx];
  const q = set.questions[currentQIdx];
  const total = set.questions.length;

  document.getElementById('progress-info').textContent = `${currentQIdx+1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentQIdx)/total)*100}%`;
  document.getElementById('question-label').textContent = `DOMANDA ${currentQIdx+1}`;
  document.getElementById('question-text').textContent = q.q;

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optsEl.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('next-btn').textContent = currentQIdx < total-1 ? 'PROSSIMA DOMANDA →' : 'VEDI RISULTATI →';
}

function selectAnswer(chosen) {
  const q = SETS[currentSetIdx].questions[currentQIdx];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;

  answers.push({ q: q.q, chosen, correct: q.correct, opts: q.opts, isCorrect });

  btns[chosen].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.correct].classList.add('reveal-correct');

  const fb = document.getElementById('feedback-box');
  const fbLabel = document.getElementById('feedback-label');
  const fbText = document.getElementById('feedback-text');

  fb.className = `feedback-box show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fbLabel.textContent = isCorrect ? '✓ CORRETTO' : '✗ SBAGLIATO';
  fbText.textContent = q.fb;

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  const total = SETS[currentSetIdx].questions.length;
  if (currentQIdx < total-1) {
    currentQIdx++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  setScores[currentSetIdx] = score;
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const pct = score / 9;
  const display = document.getElementById('score-display');
  display.textContent = `${score}/9`;
  display.className = `results-score-display ${pct >= 0.78 ? 'score-pass' : pct >= 0.55 ? 'score-partial' : 'score-fail'}`;

  const msgs = ['Da rivedere — riprova', 'Quasi — ripassare i punti errati', 'Buono — qualche gap da colmare', 'Molto buono', 'Ottimo — set dominato'];
  const msgIdx = score <= 3 ? 0 : score <= 5 ? 1 : score <= 6 ? 2 : score <= 7 ? 3 : 4;
  document.getElementById('results-subtitle').textContent = msgs[msgIdx];

  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = 9 - score;

  const reviewEl = document.getElementById('review-items');
  reviewEl.innerHTML = '';
  answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = `review-item ${a.isCorrect ? 'ri-correct' : 'ri-wrong'}`;
    div.innerHTML = `
      <div class="review-q">${i+1}. ${a.q}</div>
      <div class="review-a">${a.isCorrect ? '✓' : '✗'} ${a.opts[a.chosen]}</div>
      ${!a.isCorrect ? `<div class="review-correct-ans">Risposta corretta: ${a.opts[a.correct]}</div>` : ''}
    `;
    reviewEl.appendChild(div);
  });

  renderSets();
}

function retrySet() {
  startSet(currentSetIdx);
}

function goHome() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
  renderSets();
}

init();
</script>
</body>
</html>
